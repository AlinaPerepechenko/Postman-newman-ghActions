name: Run Postman Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-api:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

   
    - name: Install dependencies
      run: npm install

  
    - name: Start Local API Server
      run: |
        nohup npm run tern-on-api > server.log 2>&1 &

    
    - name: Wait for server to start
      run: |
        echo "Waiting for server to be ready on port 3000..."
        for i in {1..10}; do
          curl -s http://localhost:3000/products && exit 0
          sleep 3
        done
        echo "Server failed to start!" && cat server.log && exit 1

  
    - name: Install Newman and run collection
      run: |
        npm install -g newman
        newman run store.collection.json